<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <h2>Welcome to Weather App</h2>
        <div class="city-input">
            <label for="city">City</label>
            <input type="text" class="text-input" id="city" placeholder="Enter city here" required>
            <button id="search"><i class="fa-solid fa-search" aria-hidden="true"></i></button>
        </div>
        <div class="weatherResult" id="weather-result"></div>
    </div>
    <script type="module" src="dist/script.js" defer></script>
</body>
</html>
